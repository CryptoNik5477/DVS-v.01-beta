name: Deploy site to GitHub Pages

# Publie le site statique sur GitHub Pages à chaque push sur `main`.
# URL : https://cryptonik5477.github.io/issanwebpower-site/  (après renommage du dépôt en "issanwebpower-site")
# NB : GitHub Pages ne gère pas l'envoi d'email du formulaire (utiliser
# Netlify Forms ou Formspree pour ça — voir README).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
