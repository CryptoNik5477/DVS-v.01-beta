name: Deploy to Netlify

# Déploie le site statique vers Netlify.
# - Push sur `main` -> déploiement de production.
# - Déclenchement manuel possible via l'onglet "Actions".
#
# Pré-requis : ajouter 2 secrets dans
#   Settings -> Secrets and variables -> Actions -> New repository secret
#     NETLIFY_AUTH_TOKEN  = un Personal Access Token Netlify
#     NETLIFY_SITE_ID     = l'API ID du site (Netlify -> Site settings -> General -> Site ID)
#
# NB : si tu connectes déjà le dépôt depuis l'interface Netlify (déploiement
# continu intégré), tu n'as PAS besoin de ce workflow — n'utilise qu'UNE seule
# méthode pour éviter les déploiements en double.

# Déclenchement manuel uniquement (active le bloc `push` quand les secrets
# NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID sont configurés).
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Netlify (production)
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions (${{ github.sha }})"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
