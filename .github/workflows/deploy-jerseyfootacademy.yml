name: Deploy JerseyFootAcademy to Netlify

# Builds the Next.js app on GitHub's runners and deploys it to Netlify using a
# token — no GitHub↔Netlify OAuth connection required. The site is targeted by
# NAME and created automatically if it doesn't exist yet, so only the
# NETLIFY_AUTH_TOKEN secret is required.
on:
  push:
    branches: [main]
    paths:
      - "jerseyfootacademy/**"
      - ".github/workflows/deploy-jerseyfootacademy.yml"
  workflow_dispatch:

env:
  SITE_NAME: jerseyfootacademy

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jerseyfootacademy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: jerseyfootacademy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure the Netlify site exists (create if missing)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npx --yes netlify-cli@17 sites:create --name "$SITE_NAME" --account-slug CryptoNik5477 \
            || echo "Site already exists or name taken — continuing."

      - name: Build & deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx --yes netlify-cli@17 deploy --build --prod --site "$SITE_NAME"
