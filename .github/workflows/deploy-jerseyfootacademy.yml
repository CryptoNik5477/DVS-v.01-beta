name: Deploy JerseyFootAcademy to Netlify

# Builds the Next.js app on GitHub's runners and deploys it to Netlify using a
# token — no GitHub↔Netlify OAuth connection required. The site is discovered
# (or created) automatically, so only the NETLIFY_AUTH_TOKEN secret is needed.
on:
  push:
    branches: [main]
    paths:
      - "jerseyfootacademy/**"
      - ".github/workflows/deploy-jerseyfootacademy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jerseyfootacademy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: jerseyfootacademy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve or create the Netlify site
        id: site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -e
          CLI="npx --yes netlify-cli@17"
          NAME=jerseyfootacademy

          echo "Looking for an existing site named '$NAME'…"
          SITE_ID=$($CLI sites:list --json 2>/dev/null | jq -r --arg n "$NAME" '.[] | select(.name==$n) | .id' | head -n1 || true)

          if [ -z "$SITE_ID" ] || [ "$SITE_ID" = "null" ]; then
            SLUG=$($CLI api listAccountsForUser --data '{}' | jq -r '.[0].slug')
            echo "No existing site found. Creating one in team '$SLUG'…"
            RESP=$($CLI api createSiteInTeam --data "{\"account_slug\":\"$SLUG\",\"body\":{\"name\":\"$NAME\"}}" 2>/dev/null || true)
            SITE_ID=$(echo "$RESP" | jq -r '.id // empty')
            if [ -z "$SITE_ID" ]; then
              echo "Name unavailable — creating a site with an auto-generated name…"
              SITE_ID=$($CLI api createSiteInTeam --data "{\"account_slug\":\"$SLUG\",\"body\":{}}" | jq -r '.id')
            fi
          fi

          echo "Using Netlify site id: $SITE_ID"
          echo "site_id=$SITE_ID" >> "$GITHUB_OUTPUT"

      - name: Build & deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx --yes netlify-cli@17 deploy --build --prod --site "${{ steps.site.outputs.site_id }}"
