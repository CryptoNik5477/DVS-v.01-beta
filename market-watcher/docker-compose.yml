# Market Watcher — full Phase 1 stack.
# Bring up with: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watcher}
      POSTGRES_DB: ${POSTGRES_DB:-watcher}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watcher}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      # Override hosts so containers talk to each other by service name.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-watcher}:${POSTGRES_PASSWORD:-watcher}@db:5432/${POSTGRES_DB:-watcher}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Browser calls the backend directly; default assumes localhost.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
        NEXT_PUBLIC_API_TOKEN: ${DASHBOARD_API_TOKEN:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
